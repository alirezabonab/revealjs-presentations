<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Presentation board</title>
  <desc id="desc">A diagram-style sample board for the example presentation.</desc>
  <defs>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffaf3" />
      <stop offset="100%" stop-color="#f5ead9" />
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="#efe2cf" />
  <rect x="80" y="70" width="800" height="400" rx="28" fill="url(#paper)" stroke="#c98356" stroke-width="8" />
  <text x="130" y="150" font-family="Georgia, serif" font-size="40" fill="#7f341d">Deck Asset Example</text>
  <text x="130" y="210" font-family="Courier New, monospace" font-size="28" fill="#3a2c22">assets/board.svg</text>
  <text x="130" y="265" font-family="Courier New, monospace" font-size="24" fill="#3a2c22">+---------------------------+</text>
  <text x="130" y="298" font-family="Courier New, monospace" font-size="24" fill="#3a2c22">| image next to markdown    |</text>
  <text x="130" y="331" font-family="Courier New, monospace" font-size="24" fill="#3a2c22">| loaded through /content   |</text>
  <text x="130" y="364" font-family="Courier New, monospace" font-size="24" fill="#3a2c22">+---------------------------+</text>
</svg>
