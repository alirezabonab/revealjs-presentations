<!doctype html>
<html lang="en" class="presentation-page">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#020202" />
    <title>{{PAGE_TITLE}}</title>
    <link rel="icon" href="{{FAVICON_HREF}}" type="image/svg+xml" />
    {{THEME_BOOT_SCRIPT}}
    <link rel="stylesheet" href="{{REVEAL_RESET_HREF}}" />
    <link rel="stylesheet" href="{{REVEAL_CSS_HREF}}" />
    <link rel="stylesheet" href="{{REVEAL_THEME_HREF}}" />
    <link rel="stylesheet" href="{{BASE_CSS_HREF}}" />
    <link rel="stylesheet" href="{{PRESENTATION_CSS_HREF}}" />
    {{EXTRA_STYLES}}
  </head>
  <body class="presentation-shell">
    {{THEME_TOGGLE}}
    <div class="reveal">
      <div class="slides">
        <section
          data-markdown
          data-separator="^---$"
          data-separator-vertical="^--$"
          data-separator-notes="^Notes?:"
        >
          <textarea data-template>
{{MARKDOWN_SOURCE}}
          </textarea>
        </section>
      </div>
    </div>

    <script src="{{REVEAL_SCRIPT_SRC}}"></script>
    <script src="{{REVEAL_MARKDOWN_SCRIPT_SRC}}"></script>
    <script src="{{REVEAL_NOTES_SCRIPT_SRC}}"></script>
    <script src="{{REVEAL_ZOOM_SCRIPT_SRC}}"></script>
    <script src="{{PRESENTATION_RUNTIME_SRC}}"></script>
    <script src="{{ASCII_MORPH_VENDOR_SRC}}"></script>
    {{EXTRA_SCRIPTS}}
    <script>
      const revealConfig = {{REVEAL_CONFIG}};

      Reveal.initialize({
        ...revealConfig,
        plugins: [RevealMarkdown, RevealNotes, RevealZoom]
      });

      window.initializeAsciiPresentation?.(Reveal);
    </script>
  </body>
</html>
